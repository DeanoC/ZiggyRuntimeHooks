name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    uses: DeanoC/Spiderweb/.github/workflows/ziggy-shared-ci.yml@main
    with:
      install_sqlite: true
      verify_script: |
        if grep -qE '\.path = "\.\./Ziggy' build.zig.zon; then
          echo "Local path Ziggy dependencies are not allowed in CI"
          exit 1
        fi
        grep -q 'ziggy_memory_store' build.zig.zon
        grep -q 'ziggy_run_orchestrator' build.zig.zon
        grep -q '\.path = "deps/ziggy-memory-store"' build.zig.zon
        grep -q '\.path = "deps/ziggy-run-orchestrator"' build.zig.zon
        grep -q '".gitmodules"' build.zig.zon
